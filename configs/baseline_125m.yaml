# M1: Dense nanoGPT baseline, no QCROP. Target PPL within 5% of published nanoGPT.
data:
  dataset: openwebtext
  seq_len: 1024
  batch_size: 32
model:
  d_model: 768
  n_layer: 12
  n_head: 12
  use_qcrop: false
optim:
  lr_peak: 3.0e-4
  lr_warmup: 500
  total_steps: 50000
  grad_clip: 1.0
log:
  log_every: 50
  eval_every: 1000
  ckpt_every: 5000
